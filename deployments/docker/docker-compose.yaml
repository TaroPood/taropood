services:

  postgresql:
    image: postgres:18.0
    container_name: postgresql
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5445:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks: [taropood-net]
    healthcheck:
        test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
        interval: 1m
        timeout: 5s
        retries: 3
        start_period: 30s
        start_interval: 2s
  
  taropood:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: taropood:dev
    container_name: taropood-app
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_NAME: ${APP_NAME:-taropood}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}

      POSTGRES_HOST: postgresql
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-disable}
      POSTGRES_MAX_OPEN_CONNS: ${POSTGRES_MAX_OPEN_CONNS:-25}
      POSTGRES_MAX_IDLE_CONNS: ${POSTGRES_MAX_IDLE_CONNS:-10}
      POSTGRES_CONN_MAX_LIFETIME: ${POSTGRES_CONN_MAX_LIFETIME:-5m}
      POSTGRES_CONNECT_TIMEOUT: ${POSTGRES_CONNECT_TIMEOUT:-5s}



    volumes:
      - ../..:/app:cached
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/go-build
    ports:
      - "8089:8080"
      - "50051:50051"
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits: { memory: 2G, cpus: "2.0" }
    networks: [taropood-net]

volumes:
  postgres_data:
  go-mod-cache:
  go-build-cache:


networks:
  taropood-net:
